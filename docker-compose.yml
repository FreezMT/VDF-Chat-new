# API использует SQLite (файл в volume). PostgreSQL в профиле — для будущей миграции на provider=postgresql.

services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vdf_chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: "file:/app/prisma/prod.db"
      REDIS_URL: redis://redis:6379
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
    ports:
      - "4000:4000"
    volumes:
      - api_sqlite:/app/prisma
    depends_on:
      - redis

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  api_sqlite:
